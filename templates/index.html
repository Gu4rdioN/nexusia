<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCoach | Nexus Legacy</title>
    <style>
        /* CONFIGURAÇÕES GERAIS - ESTILO NEXUS LEGACY */
        :root {
            --cor-fundo: #0a0a0a;
            --cor-card: #141414;
            --cor-primaria: #ff4d00;
            --cor-texto: #ffffff;
            --cor-suave: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .barra-navegacao {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 2px solid var(--cor-primaria);
        }

        .logotipo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .logotipo span {
            color: var(--cor-primaria);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .botao-menu {
            background-color: var(--cor-primaria);
            padding: 8px 15px;
            border-radius: 5px;
            color: black !important;
            font-weight: bold;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 20px auto;
            width: 95%;
            background: var(--cor-card);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .chat-header {
            background: #1a1a1a;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        .chat-header h2 { font-size: 1.2rem; text-transform: uppercase; }
        .chat-header span { color: var(--cor-primaria); }

        #chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .mensagem {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 15px;
            line-height: 1.5;
            font-size: 15px;
            position: relative;
        }

        .user-message {
            align-self: flex-end;
            background: var(--cor-primaria);
            color: black;
            font-weight: 500;
            border-bottom-right-radius: 2px;
        }

        .bot-message {
            align-self: flex-start;
            background: #252525;
            color: white;
            border-bottom-left-radius: 2px;
            border: 1px solid #444;
        }

        /* ANIMAÇÃO DE DIGITANDO */
        .typing {
            display: none; /* Escondido por padrão */
            align-self: flex-start;
            background: #252525;
            padding: 15px;
            border-radius: 15px;
            border-bottom-left-radius: 2px;
            border: 1px solid #444;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: var(--cor-primaria);
            border-radius: 50%;
            display: inline-block;
            margin-right: 3px;
            animation: bounce 1.3s linear infinite;
        }

        .dot:nth-child(2) { animation-delay: -1.1s; }
        .dot:nth-child(3) { animation-delay: -0.9s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-7px); }
        }

        .chat-input-area {
            padding: 20px;
            background: #1a1a1a;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            background: #000;
            border: 1px solid #444;
            padding: 12px 15px;
            color: white;
            border-radius: 5px;
            outline: none;
        }

        button#btn-enviar {
            background: var(--cor-primaria);
            color: black;
            border: none;
            padding: 0 25px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            color: var(--cor-suave);
            background: black;
        }
    </style>
</head>
<body>

    <header class="barra-navegacao">
        <div class="logotipo">NEXUS<span>LEGACY</span></div>
        <nav>
            <ul>
                <li><a href="/">Início</a></li>
                <li><a href="#" style="color: var(--cor-primaria);">MyCoach</a></li>
                <li><a href="#">Treinos</a></li>
                <li><a href="#" class="botao-menu">Matricule-se</a></li>
            </ul>
        </nav>
    </header>

    <main class="chat-container">
        <div class="chat-header">
            <h2>MyCoach <span>Legacy</span> IA</h2>
        </div>

        <div id="chat-messages">
            <div class="mensagem bot-message">
                Pronto para forjar sua melhor versão? Como posso ajudar hoje?
            </div>
            <div id="typing-indicator" class="typing">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Pergunte sobre treinos ou dieta...">
            <button id="btn-enviar">FORJAR</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Nexus Legacy Gym - Todos os direitos reservados.</p>
    </footer>

    <script>
        const input = document.getElementById('user-input');
        const btn = document.getElementById('btn-enviar');
        const chatMessages = document.getElementById('chat-messages');
        const typingIndicator = document.getElementById('typing-indicator');

        async function enviarMensagem() {
            const mensagem = input.value.trim();
            if (!mensagem) return;

            adicionarMensagem(mensagem, 'user-message');
            input.value = '';

            // Mostrar indicador de digitação e mover para o final
            typingIndicator.style.display = 'block';
            chatMessages.appendChild(typingIndicator); 
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                const response = await fetch('/perguntar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensagem: mensagem })
                });

                const dados = await response.json();
                
                typingIndicator.style.display = 'none'; // Esconde indicador
                adicionarMensagem(dados.resposta, 'bot-message');
            } catch (error) {
                typingIndicator.style.display = 'none';
                adicionarMensagem("Erro técnico na NexusIA.", 'bot-message');
            }
        }

        function adicionarMensagem(texto, classe) {
            const div = document.createElement('div');
            div.className = `mensagem ${classe}`;
            div.innerText = texto;
            // Insere antes do indicador para ele sempre ficar por último enquanto ativo
            chatMessages.insertBefore(div, typingIndicator);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        btn.addEventListener('click', enviarMensagem);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') enviarMensagem(); });
    </script>
</body>
</html>
